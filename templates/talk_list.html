{% if talk.video_id %}
<div class="video-container shadow rounded overflow-hidden mb-4">
    <div class="ratio ratio-16x9">
        <iframe 
            src="https://www.youtube.com/embed/{{ talk.video_id }}" 
            title="{{ talk.title }}" 
            loading="lazy"
            allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
            allowfullscreen>
        </iframe>
    </div>
</div>
{% elif talk.media_file %}
<div class="video-container shadow rounded overflow-hidden mb-4">
    <video controls class="w-100">
        <source src="{{ talk.media_file.url }}" type="video/mp4">
    </video>
</div>
{% endif %}
