{% if talk.video_id %}
<div class="video-container shadow rounded overflow-hidden mb-4">
    <div style="height:160px;overflow:hidden;">
        <a href="{{ talk.external_link }}" target="_blank" style="display:block;position:relative;width:100%;height:100%;overflow:hidden;">
                            <img src="https://img.youtube.com/vi/{{ talk.video_id }}/mqdefault.jpg" style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:100%;height:100%;object-fit:cover;object-position:center;" alt="{{ talk.title }}" onerror="this.src='https://img.youtube.com/vi/{{ talk.video_id }}/mqdefault.jpg'">
                            <div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(255,0,0,0.85);border-radius:50%;width:60px;height:60px;display:flex;align-items:center;justify-content:center;z-index:1;">
                                <span style="color:white;font-size:24px;margin-left:4px;">&#9654;</span>
                            </div>
                        </a>
    </div>
</div>
{% elif talk.media_file %}
<div class="video-container shadow rounded overflow-hidden mb-4">
    <video controls class="w-100">
        <source src="{{ talk.media_file.url }}" type="video/mp4">
    </video>
</div>
{% endif %}
