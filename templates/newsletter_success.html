<div class="newsletter-status p-2 rounded {% if status == 'success' %}text-success{% elif status == 'info' %}text-info{% else %}text-danger{% endif %}">
    {% if status == 'success' %}
        <i class="bi bi-check-circle-fill me-1"></i>
    {% elif status == 'info' %}
        <i class="bi bi-info-circle-fill me-1"></i>
    {% else %}
        <i class="bi bi-exclamation-triangle-fill me-1"></i>
    {% endif %}
    <span class="small fw-bold">{{ message }}</span>
</div>
